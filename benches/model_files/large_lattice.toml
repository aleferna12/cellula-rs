[general]
time-steps = 2048
seed = 1241254152
n-environments = 1

[environment]
width = 2000
height = 2000
enclose = false
neigh-r = 1
starting-cells = 300
max-cells = 1024
cell-search-radius = 2.5
update-period = 16

[cell]
starting-area = 64
target-area = 64
div-area = 128
divide = true
migrate = true
n-regulatory-genes = 2
mutation-rate = 0.01
mutation-std = 0.01

[cellular-automata]
boltz-t = 16.0
size-lambda = 1.0
chemotaxis-mu = 4.0

[cellular-automata.adhesion]
cell-energy = 16.0
medium-energy = 16.0
solid-energy = 16.0

[io]
outdir = "benches/model_outputs/large_lattice"
replace-outdir = true
image-period = 1000
image-format = "webp"

[io.movie]
show = false
width = 320
height = 320
frame-period = 50

[io.plot]
order = ["spin"]
solid-color = "#000000"
center-color = "#00ff00"
chem-center-color = "#00ff00"
clones-color = "#ff0000"
all-clones = false
border-color = "#000000"
area-min-color = "#ff00ff"
area-max-color = "#ffff00"
chem-min-color = "#000000"
chem-max-color = "#ffffff"
migrating-color = "#b30000"
dividing-color = "#045a8d"
