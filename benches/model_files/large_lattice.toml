[general]
time-steps = 2048
seed = 1241254152

[environment]
width = 2000
height = 2000
enclose = false
neigh-r = 1
starting-cells = 300
max-cells = 1024
cell-start-area = 64
cell-search-radius = 2.5
update-period = 16

[environment.cell]
target-area = 64
div-area = 128
divide = true
migrate = false

[cellular-automata]
boltz-t = 16.0
size-lambda = 1.0
chemotaxis-mu = 4.0

[cellular-automata.adhesion]
cell-energy = 16.0
medium-energy = 16.0
solid-energy = 16.0

[io]
outdir = "benches/model_outputs/large_lattice"
replace-outdir = true
image-period = 1000
image-format = "webp"

[io.movie]
show = false
width = 320
height = 320
frame-period = 50

[io.plots]
order = ["spin"]
solid-color = "#000000"
center-color = "#00ff00"
light-center-color = "#00ff00"
clones-color = "#ff0000"
all-clones = false
border-color = "#000000"
area-min-color = "#ff00ff"
area-max-color = "#ffff00"
light-min-color = "#000000"
light-max-color = "#ffffff"
