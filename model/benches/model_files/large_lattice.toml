[general]
time-steps = 2048
seed = 1241254152
dispersion-period = 1000

[pond]
n-ponds = 1
width = 2000
height = 2000
enclose = false
neigh-r = 1

[cell]
starting-cells = 300
max-cells = 1024
search-radius = 3
starting-area = 64
target-area = 64
div-area = 128
divide = true
migrate = true
update-period = 32

[cell.genome]
n-regulatory = 2
mutation-rate = 0.01
mutation-std = 0.01

[ca]
boltz-t = 16.0
size-lambda = 1.0
chemotaxis-mu = 4.0

[ca.adhesion]
clone-energy = 8
cell-energy = 16
medium-energy = 16
solid-energy = 16

[io]
outdir = "model/benches/model_outputs/large_lattice"
replace-outdir = true
image-period = 1000
cell-period = 1000
genome-period = 1000
lattice-period = 1000
image-format = "webp"

[io.movie]
show = false
width = 320
height = 320
frame-period = 50

[io.plot]
order = ["spin"]
solid-color = "#000000"
center-color = "#00ff00"
chem-center-color = "#00ff00"
clones-color = "#ff0000"
all-clones = false
border-color = "#000000"
area-min-color = "#ff00ff"
area-max-color = "#ffff00"
chem-min-color = "#000000"
chem-max-color = "#ffffff"
migrating-color = "#b30000"
dividing-color = "#045a8d"
