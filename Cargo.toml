[package]
name = "evo-cpm"
version = "0.0.1"
edition = "2024"

[profile.release]
# Change to "thin" or "off" if compilation time becomes a problem
lto = "fat"

[dependencies]
clap = { version = "4.5.39", features = ["derive"] }
env_logger = "0.11.8"
image = "0.25.6"
indexmap = "2.9.0"
log = "0.4.27"
num = "0.4.3"
rand = "0.9.1"
rand_xoshiro = "0.7.0"

[dev-dependencies]
criterion = { version = "0.6.0", features = ["html_reports"] }

[[bench]]
name = "main"
harness = false

[[bench]]
name = "env_bench"
harness = false

[[bench]]
name = "model_bench"
harness = false
