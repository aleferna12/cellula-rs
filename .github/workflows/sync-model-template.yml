name: Sync model in template repo

on:
  push:
    branches:
      - master
    paths:
      - 'model/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push model/ to template repo
        run: |
          # Get cellulars version
          version=$(grep '^version' cellulars/Cargo.toml)
          profiles=$(awk '/^\[profile/{found=1} found{print} /^\[/{if(!/^\[profile/)found=0}' Cargo.toml)

          # Clone the template repo
          git clone https://x-access-token:${{ secrets.MODEL_TEMPLATE_TOKEN }}@github.com/aleferna12/cellulars-template.git /tmp/model-template

          # Sync model/ contents into the template repo (delete removed files too)
          rsync -av --delete --exclude='.git' model/ /tmp/model-template/

          # Commit and push if there are changes
          cd /tmp/model-template
          sed -i "s|cellulars = { path = \"[^\"]*\"|cellulars = { $version|" Cargo.toml
          echo '\n\n'"$profiles" >> Cargo.toml 
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "sync: ${{ github.event.head_commit.message }}"
          git push